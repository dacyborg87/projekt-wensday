<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Wensday OS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* Jarvis / Wensday vibe */
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: radial-gradient(circle at top, #181830, #050509);
      color: #f5f7ff;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .frame {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .header {
      padding: 8px 0 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-mark {
      width: 38px;
      height: 38px;
      object-fit: contain;
      filter: drop-shadow(0 0 12px rgba(0, 200, 255, 0.85));
    }
    .title {
      font-size: 1.2rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.9;
    }
    .status-pill {
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(120, 255, 200, 0.4);
      color: #78ffc8;
      background: rgba(0, 80, 60, 0.25);
    }
    .panel {
      flex: 1;
      border-radius: 16px;
      border: 1px solid rgba(120, 255, 200, 0.25);
      background: linear-gradient(145deg, rgba(10, 12, 30, 0.85), rgba(3, 5, 15, 0.95));
      padding: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-log {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      scrollbar-width: thin;
    }
    .bubble {
      max-width: 80%;
      margin-bottom: 10px;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 0.92rem;
      line-height: 1.4;
      white-space: pre-wrap;
    }
    .bubble.me {
      margin-left: auto;
      background: rgba(120, 255, 200, 0.16);
      border: 1px solid rgba(120, 255, 200, 0.6);
    }
    .bubble.ai {
      margin-right: auto;
      background: rgba(40, 45, 80, 0.9);
      border: 1px solid rgba(110, 130, 255, 0.4);
    }
    .bubble.system {
      margin: 0 auto 10px;
      max-width: 60%;
      text-align: center;
      font-size: 0.8rem;
      opacity: 0.7;
      background: transparent;
      border: none;
    }
    .footer {
      display: flex;
      gap: 8px;
      padding-top: 10px;
      border-top: 1px solid rgba(120, 255, 200, 0.2);
      margin-top: 8px;
    }
    .input {
      flex: 1;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(120, 255, 200, 0.35);
      background: rgba(2, 5, 15, 0.9);
      color: #f5f7ff;
      outline: none;
      font-size: 0.9rem;
    }
    .input::placeholder {
      color: rgba(200, 210, 255, 0.4);
    }
    .send-btn {
      padding: 8px 14px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #78ffc8, #4ad0ff);
      color: #020308;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .mic-btn {
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(120, 255, 200, 0.6);
      background: rgba(5, 20, 25, 0.9);
      color: #78ffc8;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .mic-btn.listening {
      border-color: #ffcc66;
      color: #ffcc66;
      box-shadow: 0 0 8px rgba(255, 204, 102, 0.6);
    }
    .send-btn:disabled {
      opacity: 0.6;
      cursor: default;
    }
    .mode-tag {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      opacity: 0.7;
      margin-bottom: 4px;
    }
    .error {
      color: #ff8080;
      font-size: 0.8rem;
      margin-top: 4px;
    }
    /* Jarvis core glow + breathing animation */
    .jarvis-core {
      position: relative;
      padding: 12px;
      border-radius: 16px;
      background: radial-gradient(circle at top, rgba(0, 255, 200, 0.06), rgba(0, 20, 30, 0.65));
      box-shadow:
        0 0 18px rgba(0, 255, 200, 0.18),
        inset 0 0 18px rgba(0, 255, 200, 0.12);
      animation: jarvisBreath 4s ease-in-out infinite;
      backdrop-filter: blur(12px);
    }
    .jarvis-core::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 160px;
      height: 160px;
      transform: translate(-50%, -50%);
      background-image: url("/static/wensday-logo.png");
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      opacity: 0.13;
      filter: drop-shadow(0 0 24px rgba(0, 255, 255, 0.6));
      pointer-events: none;
      z-index: 0;
    }
    .jarvis-core > * {
      position: relative;
      z-index: 1;
    }

    @keyframes jarvisBreath {
      0% {
        box-shadow:
          0 0 16px rgba(0, 255, 200, 0.12),
          inset 0 0 12px rgba(0, 255, 200, 0.08);
      }
      50% {
        box-shadow:
          0 0 34px rgba(0, 255, 200, 0.38),
          inset 0 0 26px rgba(0, 255, 200, 0.22);
      }
      100% {
        box-shadow:
          0 0 16px rgba(0, 255, 200, 0.12),
          inset 0 0 12px rgba(0, 255, 200, 0.08);
      }
    }

    /* Jarvis speaking pulse when voice is playing */
    .jarvis-core.jarvis-speaking {
      animation: jarvisTalking 1.1s ease-in-out infinite;
    }

    @keyframes jarvisTalking {
      0% {
        box-shadow:
          0 0 20px rgba(0, 255, 200, 0.25),
          inset 0 0 16px rgba(0, 255, 200, 0.18);
      }
      50% {
        box-shadow:
          0 0 40px rgba(0, 255, 200, 0.55),
          inset 0 0 30px rgba(0, 255, 200, 0.35);
      }
      100% {
        box-shadow:
          0 0 20px rgba(0, 255, 200, 0.25),
          inset 0 0 16px rgba(0, 255, 200, 0.18);
      }
    }

    /* Waveform-style visualizer inside the Jarvis core */
    .voice-visualizer {
      position: absolute;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: flex-end;
      gap: 4px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease-out;
    }

    .voice-visualizer.active {
      opacity: 1;
    }

    .vv-bar {
      width: 4px;
      height: 10px;
      border-radius: 999px;
      background: rgba(120, 255, 200, 0.85);
      animation: vvPulse 0.9s ease-in-out infinite;
      animation-play-state: paused;
    }

    .voice-visualizer.active .vv-bar {
      animation-play-state: running;
    }

    .vv-bar:nth-child(1) {
      animation-delay: 0s;
    }
    .vv-bar:nth-child(2) {
      animation-delay: 0.1s;
    }
    .vv-bar:nth-child(3) {
      animation-delay: 0.2s;
    }
    .vv-bar:nth-child(4) {
      animation-delay: 0.3s;
    }
    .vv-bar:nth-child(5) {
      animation-delay: 0.4s;
    }

    @keyframes vvPulse {
      0% {
        height: 8px;
        opacity: 0.4;
      }
      25% {
        height: 18px;
        opacity: 0.8;
      }
      50% {
        height: 26px;
        opacity: 1;
      }
      75% {
        height: 16px;
        opacity: 0.8;
      }
      100% {
        height: 8px;
        opacity: 0.4;
      }
    }

    /* Boot-up overlay */
    .boot-overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, #020816, #000000 65%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 1;
      transform: scale(1);
      transition: opacity 0.8s ease-out, transform 1s ease-out;
    }

    .boot-inner {
      text-align: center;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #e8faff;
    }

    .boot-logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 18px;
      object-fit: contain;
      filter: drop-shadow(0 0 28px rgba(0, 220, 255, 0.95));
      animation: bootPulse 2.4s ease-in-out infinite;
    }

    .boot-title {
      font-size: 1rem;
      margin-bottom: 6px;
    }

    .boot-sub {
      font-size: 0.7rem;
      opacity: 0.7;
    }

    .boot-overlay.boot-hide {
      opacity: 0;
      transform: scale(1.04);
      pointer-events: none;
    }

    @keyframes bootPulse {
      0% {
        filter: drop-shadow(0 0 10px rgba(0, 220, 255, 0.6));
      }
      50% {
        filter: drop-shadow(0 0 28px rgba(0, 220, 255, 1));
      }
      100% {
        filter: drop-shadow(0 0 10px rgba(0, 220, 255, 0.6));
      }
    }
  </style>
</head>
<body>
  <div id="bootOverlay" class="boot-overlay">
    <div class="boot-inner">
      <img src="/static/wensday-logo.png" alt="Wensday boot logo" class="boot-logo" />
      <div class="boot-title">WENSDAY • OS</div>
      <div class="boot-sub">Initializing system...</div>
    </div>
  </div>
  <div class="frame">
    <div class="header">
      <div class="brand">
        <img src="/static/wensday-logo.png" alt="Wensday logo" class="logo-mark" />
        <div>
          <div class="title">WENSDAY • OS</div>
          <div class="mode-tag" id="modeTag">Mode: Auto (Lab / School / Planner / Brand / Family)</div>
        </div>
      </div>
      <div class="status-pill" id="statusPill">ONLINE</div>
    </div>

    <div class="panel">
      <div class="jarvis-core">
        <div class="voice-visualizer" id="voiceVisualizer">
          <div class="vv-bar"></div>
          <div class="vv-bar"></div>
          <div class="vv-bar"></div>
          <div class="vv-bar"></div>
          <div class="vv-bar"></div>
        </div>

        <div id="chatLog" class="chat-log">
          <div class="bubble system">
            Wensday online. Type anything to begin.<br/>
            Use your same commands: <code>lab summary</code>, <code>status</code>, <code>goals</code>, etc.
          </div>
        </div>

        <div class="footer">
          <input
            id="chatInput"
            class="input"
            type="text"
            autocomplete="off"
            placeholder="Talk to Wensday..."
          />
          <button id="micBtn" class="mic-btn" type="button">
            <span id="micIcon">🎙️</span>
          </button>
          <button id="aiVoiceBtn" class="mic-btn" type="button">
            <span id="aiVoiceIcon">🤖</span>
          </button>
          <button id="muteBtn" class="mic-btn" type="button">
            <span id="muteIcon">🔇</span>
          </button>
          <button id="sendBtn" class="send-btn" type="button">Send</button>
        </div>
        <div id="errorMsg" class="error"></div>
      </div>
    </div>
  </div>

  <script>
    const chatLog = document.getElementById("chatLog");
    const chatInput = document.getElementById("chatInput");
    const sendBtn = document.getElementById("sendBtn");
    const errorMsg = document.getElementById("errorMsg");
    const modeTag = document.getElementById("modeTag");

    const micBtn = document.getElementById("micBtn");
    const micIcon = document.getElementById("micIcon");
    const aiVoiceBtn = document.getElementById("aiVoiceBtn");
    const aiVoiceIcon = document.getElementById("aiVoiceIcon");
    const muteBtn = document.getElementById("muteBtn");
    const muteIcon = document.getElementById("muteIcon");
    let isMuted = false;
    let useAiVoice = false;

    const jarvisCore = document.querySelector(".jarvis-core");
    const voiceVisualizer = document.getElementById("voiceVisualizer");
    const bootOverlay = document.getElementById("bootOverlay");

    function startSpeakingAnimation() {
      if (jarvisCore) {
        jarvisCore.classList.add("jarvis-speaking");
      }
      if (voiceVisualizer) {
        voiceVisualizer.classList.add("active");
      }
    }

    function stopSpeakingAnimation() {
      if (jarvisCore) {
        jarvisCore.classList.remove("jarvis-speaking");
      }
      if (voiceVisualizer) {
        voiceVisualizer.classList.remove("active");
      }
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let isListening = false;

    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.lang = "en-US";
      recognition.continuous = false;
      recognition.interimResults = false;

      recognition.onstart = () => {
        isListening = true;
        micBtn.classList.add("listening");
        micIcon.textContent = "🟢";
        errorMsg.textContent = "Listening...";
      };

      recognition.onend = () => {
        isListening = false;
        micBtn.classList.remove("listening");
        micIcon.textContent = "🎙️";
        errorMsg.textContent = "";
      };

      recognition.onerror = (event) => {
        console.error("Speech recognition error:", event);
        errorMsg.textContent = "Voice input error. Try again.";
        isListening = false;
        micBtn.classList.remove("listening");
        micIcon.textContent = "🎙️";
      };

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        chatInput.value = transcript;
        // Auto-send after voice input
        sendMessage();
      };
    } else {
      // If speech recognition is not supported
      micBtn.disabled = true;
      micIcon.textContent = "🚫";
      errorMsg.textContent = "Voice input not supported in this browser.";
    }

    function toggleMic() {
      if (!recognition) return;
      if (isListening) {
        recognition.stop();
      } else {
        errorMsg.textContent = "";
        recognition.start();
      }
    }

    function toggleMute() {
      isMuted = !isMuted;
      if (isMuted) {
        if ("speechSynthesis" in window) {
          speechSynthesis.cancel();
        }
        muteIcon.textContent = "🔈"; // indicate muted state
        errorMsg.textContent = "Voice output muted.";
      } else {
        muteIcon.textContent = "🔇"; // back to unmuted icon
        if (errorMsg.textContent === "Voice output muted.") {
          errorMsg.textContent = "";
        }
      }
    }

    function speakLocal(text) {
      if (!("speechSynthesis" in window)) return;
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 1.0;
      utterance.pitch = 1.0;
      utterance.volume = 1.0;

      try {
        startSpeakingAnimation();
        utterance.onend = () => {
          stopSpeakingAnimation();
        };
        utterance.onerror = () => {
          stopSpeakingAnimation();
        };
        speechSynthesis.cancel();
        speechSynthesis.speak(utterance);
      } catch (e) {
        console.error("Local TTS error:", e);
        stopSpeakingAnimation();
      }
    }

    async function playAiVoice(text) {
      try {
        startSpeakingAnimation();

        const resp = await fetch("/tts", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ text })
        });
        if (!resp.ok) {
          throw new Error("HTTP " + resp.status);
        }
        const arrayBuffer = await resp.arrayBuffer();
        const blob = new Blob([arrayBuffer], { type: "audio/mpeg" });
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);

        audio.onended = () => {
          stopSpeakingAnimation();
        };
        audio.onerror = () => {
          stopSpeakingAnimation();
        };

        audio.play();
      } catch (e) {
        console.error("AI voice error:", e);
        stopSpeakingAnimation();
        // Fallback to local TTS
        if (!isMuted) {
          speakLocal(text);
        }
      }
    }

    function toggleAiVoice() {
      useAiVoice = !useAiVoice;
      if (useAiVoice) {
        aiVoiceIcon.textContent = "🟢";
        errorMsg.textContent = "AI voice mode (ElevenLabs) ON.";
      } else {
        aiVoiceIcon.textContent = "🤖";
        if (errorMsg.textContent === "AI voice mode (ElevenLabs) ON.") {
          errorMsg.textContent = "";
        }
      }
    }

    function appendBubble(text, who = "ai") {
      const div = document.createElement("div");
      div.className = "bubble " + who;
      div.textContent = text;
      chatLog.appendChild(div);
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    function guessModeFromText(text) {
      const lower = text.toLowerCase();
      if (lower.includes("wazuh") || lower.includes("suricata") || lower.includes("soc") || lower.includes("lab")) {
        return "Lab";
      }
      if (lower.includes("class") || lower.includes("homework") || lower.includes("school") || lower.includes("exam")) {
        return "School";
      }
      if (lower.includes("goal") || lower.includes("plan") || lower.includes("roadmap") || lower.includes("schedule")) {
        return "Planner";
      }
      if (lower.includes("tiktok") || lower.includes("brand") || lower.includes("kilovision") || lower.includes("dacyborg") || lower.includes("wensday")) {
        return "Brand";
      }
      if (lower.includes("wife") || lower.includes("kids") || lower.includes("family") || lower.includes("charmaine") || lower.includes("bria")) {
        return "Family";
      }
      return "Auto";
    }

    async function sendMessage() {
      const text = chatInput.value.trim();
      if (!text) return;

      errorMsg.textContent = "";
      chatInput.value = "";
      sendBtn.disabled = true;

      appendBubble(text, "me");

      const modeGuess = guessModeFromText(text);
      modeTag.textContent = "Mode: " + modeGuess;

      try {
        const resp = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ user_text: text, voice_mode: false })
        });

        if (!resp.ok) {
          throw new Error("HTTP " + resp.status);
        }

        const data = await resp.json();
        appendBubble(data.reply, "ai");

        // Voice out: speak Wensday's reply (unless muted)
        try {
          if (!isMuted) {
            if (useAiVoice) {
              await playAiVoice(data.reply);
            } else {
              speakLocal(data.reply);
            }
          }
        } catch (e) {
          console.error("TTS error:", e);
        }
      } catch (err) {
        console.error(err);
        errorMsg.textContent = "Error talking to Wensday. Check terminal/uvicorn.";
      } finally {
        sendBtn.disabled = false;
        chatInput.focus();
      }
    }

    // Boot overlay: fade out after short delay
    window.addEventListener("load", () => {
      if (bootOverlay) {
        setTimeout(() => {
          bootOverlay.classList.add("boot-hide");
        }, 1800);
      }
    });

    sendBtn.addEventListener("click", sendMessage);
    chatInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        sendMessage();
      }
    });
    micBtn.addEventListener("click", toggleMic);
    muteBtn.addEventListener("click", toggleMute);
    aiVoiceBtn.addEventListener("click", toggleAiVoice);

    // Autofocus on load
    chatInput.focus();
  </script>
</body>
</html>
